<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} MOAMOA NFT{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', path='moamoa.css') }}" rel="stylesheet"> 
    <script src="{{ url_for('static', path='header.js') }}"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <header>
        <div class="header-row">
            <span class="header-title">MOAMOA NFT</span>
            {% if is_logged_in %}
                <a href="/family" class="header-btn">가족 관리</a>
                <a href="/nft" class="header-btn">NFT</a>
            {% endif %}
        </div>

        {% if is_logged_in %}
        <div id="userWalletInfo">
            주소: <span id="userWalletAddress"></span>
            <button id="logoutBtn" onclick="logout()">로그아웃</button>
        </div>
        {% endif %}
        
    </header>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    {% block script %}{% endblock %}
    
</body>
</html>
