<!-- 메인 페이지 템플릿 -->
{% extends 'base.html' %}
{% block title %}가족 관리{% endblock %}
{% block head %}
<script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
{% endblock %}
{% block content %}
<h2 class="main-title">가족 관리</h2>
<div class="main-desc">가족 구성원을 등록하고 관리할 수 있습니다.</div>
<div style="text-align:right; margin-bottom:10px;">
    <button class="qr-btn" onclick="showQrReader()">QR등록</button>
</div>
<div id="qr-reader" style="display:none;"></div>
<div class="desc" style="margin-bottom: 10px;">
    <b id="qr-text" style="display: none;">인식된 </b><b>지갑 주소:</b> <span id="my-address">-</span>
    <span style="display: none;" id="owner-badge"></span>
    <button class="action-btn" id="register-my-address-btn" style="display:none; margin-left:5px;"
        onclick="registerMyAddress()">등록</button>
</div>
<div style="overflow-x:auto;">
    <table>
        <thead>
            <tr>
                <th>주소</th>
                <th>닉네임</th>
                <th>관리</th>
            </tr>
        </thead>
        <tbody>
            <tr id="my-info-row"></tr>
            <!-- 가족 목록은 JS로 렌더링 -->
        <tbody id="family-list"></tbody>
        </tbody>
    </table>
</div>
<div id="message" style="margin-top: 18px;"></div>
{% endblock %}


{% block script %}
<script>
    // 컨트랙트 주소와 ABI는 서버에서 Jinja2 변수로 전달받음
    const CONTRACT_ADDRESS = "{{ contract_address }}"; // 스마트 컨트랙트 주소 (서버에서 받아옴)
    const ABI = JSON.parse(`{{ contract_abi | tojson | safe }}`); // 스마트 컨트랙트 ABI (함수 정보, 서버에서 받아옴)
    let contract, myAddress, isOwner = false; // 컨트랙트 인스턴스, 내 지갑 주소, 오너 여부 저장 변수
    let walletConnecting = false; // 지갑 연결 중복 방지용 변수

    // 페이지가 처음 열릴 때 실행되는 함수
    window.onload = async function () {
        // 1. 브라우저에 이더리움 지갑(메타마스크 등)이 설치되어 있는지 확인
        if (window.ethereum) {
            await connectWallet(); // 있으면 지갑 연결 시도
        } else {
            // 없으면 에러 메시지 표시
            document.getElementById('message').innerHTML = '<span class="error">지갑이 연결되어 있지 않습니다.</span>';
        }
        // 페이지 로드시 my-address는 '-'로 초기화
        document.getElementById('my-address').innerText = '-';
    };

    // 지갑 연결 함수 (MetaMask 기준)
    async function connectWallet() {
        if (walletConnecting) {
            alert("지갑 연결 요청이 이미 진행 중입니다. 잠시만 기다려 주세요.");
            return;
        }
        walletConnecting = true; // 중복 연결 방지
        try {
            // 지갑에서 계정(주소) 요청 (사용자에게 지갑 연결 허용 팝업이 뜸)
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            myAddress = accounts[0]; // 첫 번째 계정(내 지갑 주소)
            console.log(myAddress);
            document.getElementById('my-address').innerText = myAddress; // 화면에 내 주소 표시
            // userWalletAddress가 있을 때만 값 할당
            const userWalletAddressElem = document.getElementById('userWalletAddress');
            if (userWalletAddressElem) {
                userWalletAddressElem.innerText = myAddress.substring(0, 6) + '...' + myAddress.substring(myAddress.length - 4);
            }

            // web3 객체 생성 (이더리움 네트워크와 통신)
            const web3 = new Web3(window.ethereum);
            // 스마트 컨트랙트 인스턴스 생성
            contract = new web3.eth.Contract(ABI, CONTRACT_ADDRESS);

            // 컨트랙트의 오너 주소 가져오기 (가족 대표 주소)
            const owner = await contract.methods.owner().call();
            isOwner = (myAddress.toLowerCase() === owner.toLowerCase()); // 오너 여부 확인
            if (isOwner) {
                document.getElementById('owner-badge').style.display = '';
                document.getElementById('owner-badge').innerText = ' (오너)';
            }

            // 가족 목록과 내 정보 화면에 표시
            renderFamilyList();
            renderMyInfo();
        } catch (e) {
            // 에러 발생 시 메시지 표시
            document.getElementById('message').innerHTML = '<span class="error">지갑 연결 실패: ' + e.message + '</span>';
        }
        walletConnecting = false;
    }

    // 가족 목록을 화면에 표시하는 함수
    async function renderFamilyList() {
        const listElem = document.getElementById('family-list');
        listElem.innerHTML = ''; // 기존 목록 초기화
        try {
            // 컨트랙트에 getMyFamilyMembers 함수가 있는지 확인 (없으면 ABI가 잘못된 것)
            if (!contract.methods.getMyFamilyMembers) {
                document.getElementById('message').innerHTML = '<span class="error">컨트랙트 ABI에 getMyFamilyMembers 함수가 없습니다. ABI를 최신으로 반영하세요.</span>';
                return;
            }
            // 내 가족 구성원 주소 목록 가져오기 (스마트컨트랙트에서 불러옴)
            const members = await contract.methods.getMyFamilyMembers().call({ from: myAddress });
            if (!Array.isArray(members)) {
                document.getElementById('message').innerHTML = '<span class="error">가족 목록을 불러오지 못했습니다. (반환값이 배열이 아님)</span>';
                return;
            }
            if (members.length === 0) {
                // 가족이 없을 때 메시지
                listElem.innerHTML = '<tr><td colspan="3">가족 구성원이 없습니다.</td></tr>';
                return;
            }
            // 가족 구성원별로 테이블 행 생성
            for (let addr of members) {
                let nickname = '';
                try {
                    // 각 가족의 닉네임 가져오기 (스마트컨트랙트에서 불러옴)
                    nickname = await contract.methods.getNickname(addr).call();
                    if (!nickname || nickname.trim() === "") {
                        nickname = '(닉네임 없음)';
                    }
                } catch (e) {
                    nickname = '(닉네임 조회 실패)';
                }
                // 테이블 행(HTML) 생성
                let row = `<tr>
                    <td>${addr}${addr.toLowerCase() === myAddress.toLowerCase() ? ' <span class="me">(나)</span>' : ''}</td>
                    <td id="nickname-cell-${addr}">${nickname}</td>
                    <td>`;
                // 내 주소면 닉네임 수정 버튼, 아니면 삭제 버튼
                if (addr.toLowerCase() === myAddress.toLowerCase()) {
                    row += `<button onclick="showNicknameEditForm('${addr}')">수정</button>
                        <span id="nickname-edit-form-${addr}" style="display:none;">
                            <input type="text" id="nickname-input-${addr}" value="${nickname}" placeholder="새 닉네임">
                            <button onclick="setMyNickname('${addr}')">저장</button>
                            <button onclick="hideNicknameEditForm('${addr}')">취소</button>
                        </span>`;
                } else {
                    row += `<button class="action-btn delete-btn" onclick="removeFamilyMember('${addr}')">삭제</button>`;
                }
                row += `</td></tr>`;
                listElem.innerHTML += row; // 테이블에 추가
            }
        } catch (e) {
            document.getElementById('message').innerHTML = `<span class="error">가족 목록을 불러올 수 없습니다: ${e.message}</span>`;
        }
    }

    // 닉네임 수정 폼을 보여주는 함수
    function showNicknameEditForm(addr) {
        document.getElementById('nickname-edit-form-' + addr).style.display = '';
        document.getElementById('nickname-input-' + addr).focus();
        // 수정 버튼 숨기기
        const editBtn = document.querySelector(`button.edit-btn[onclick="showNicknameEditForm('${addr}')"]`);
        if (editBtn) editBtn.style.display = 'none';
    }
    // 닉네임 수정 폼을 숨기는 함수
    function hideNicknameEditForm(addr) {
        document.getElementById('nickname-edit-form-' + addr).style.display = 'none';
        // 수정 버튼 다시 보이기
        const editBtn = document.querySelector(`button.edit-btn[onclick="showNicknameEditForm('${addr}')"]`);
        if (editBtn) editBtn.style.display = '';
    }
    // 내 닉네임을 변경하는 함수
    async function setMyNickname(addr) {
        const newNick = document.getElementById('nickname-input-' + addr).value; // 입력한 새 닉네임
        try {
            // 컨트랙트에 닉네임 변경 요청 (트랜잭션 발생)
            await contract.methods.setMyNickname(newNick).send({ from: myAddress });
            document.getElementById('message').innerHTML = '<span class="success">닉네임이 변경되었습니다.</span>';
            hideNicknameEditForm(addr);
            renderFamilyList();
            renderMyInfo();
        } catch (e) {
            document.getElementById('message').innerHTML = '<span class="error">닉네임 변경 실패: ' + e.message + '</span>';
        }
    }

    // 가족 구성원 삭제 함수
    async function removeFamilyMember(addr) {
        // 삭제 전 사용자 확인 창 표시
        if (!confirm('정말 삭제 하겠습니까?')) {
            // 아니오(취소) 선택 시 함수 종료
            return;
        }
        try {
            // 컨트랙트에 가족 삭제 요청 (트랜잭션 발생)
            await contract.methods.removeFamilyMember(addr).send({ from: myAddress });
            document.getElementById('message').innerHTML = '<span class="success">가족이 삭제되었습니다.</span>';
            renderFamilyList();
        } catch (e) {
            document.getElementById('message').innerHTML = '<span class="error">가족 삭제 실패: ' + e.message + '</span>';
        }
    }


    // 가족 추가 함수 (QR코드 등으로 주소와 닉네임 입력)
    async function registerMyAddress() {
        const addr = document.getElementById('my-address').innerText; // 내 주소
        const myNick = prompt('내 닉네임을 입력하세요:', '나'); // 내 닉네임 입력
        const memberNick = prompt('상대방 닉네임을 입력하세요:', '가족'); // 상대 닉네임 입력

        // 입력값 유효성 검사 (초보자도 이해할 수 있도록 상세 체크)
        if (!addr || addr === '-' || typeof addr === 'undefined') {
            alert('지갑 주소가 올바르지 않습니다.');
            return;
        }
        if (!/^0x[a-fA-F0-9]{40}$/.test(addr)) {
            alert('올바른 이더리움/클레이튼 지갑 주소가 아닙니다.');
            return;
        }
        if (!myNick || typeof myNick === 'undefined' || myNick.trim() === '') {
            alert('내 닉네임이 올바르지 않습니다.');
            return;
        }
        if (!memberNick || typeof memberNick === 'undefined' || memberNick.trim() === '') {
            alert('상대방 닉네임이 올바르지 않습니다.');
            return;
        }
        if (!myAddress || typeof myAddress === 'undefined') {
            alert('지갑이 연결되어 있지 않습니다.');
            return;
        }
        if (!/^0x[a-fA-F0-9]{40}$/.test(myAddress)) {
            alert('내 지갑 주소가 올바르지 않습니다.');
            return;
        }

        try {
            // 컨트랙트에 가족 추가 요청 (트랜잭션 발생)
            await contract.methods.addFamilyMember(addr, myNick, memberNick).send({ from: myAddress });
            document.getElementById('message').innerHTML = '<span class="success">가족이 등록되었습니다.</span>';
            renderFamilyList();
            renderMyInfo();
        } catch (e) {
            document.getElementById('message').innerHTML = '<span class="error">가족 등록 실패: ' + e.message + '</span>';
        }
    }

    // QR코드 리더를 보여주고, 인식된 값을 내 주소로 설정하는 함수
    function showQrReader() {
        document.getElementById('qr-reader').style.display = '';
        if (!window.qrReaderInitialized) {
            // QR코드 리더 객체 생성 (카메라로 QR코드 인식)
            const qrReader = new Html5Qrcode("qr-reader");
            qrReader.start(
                { facingMode: "environment" }, // 후면 카메라 사용
                { fps: 10, qrbox: 250 }, // 초당 프레임, QR박스 크기
                (decodedText, decodedResult) => {
                    // QR코드 인식 성공 시
                    document.getElementById('owner-badge').style.display = 'none';
                    document.getElementById('my-address').innerText = decodedText; // 내 주소로 설정 (QR 인식 시에만)
                    document.getElementById('qr-text').style.display = ''; // qr 주소 분별용 텍스트 표시
                    document.getElementById('qr-text').style.display = 'none';
                    // QR 인식 시 등록 버튼 보이기
                    document.getElementById('register-my-address-btn').style.display = '';
                    qrReader.stop().then(() => {
                        document.getElementById('qr-reader').style.display = 'none'; // 리더 숨김
                    });
                    window.qrReaderInitialized = false;
                },
                (errorMessage) => { } // 인식 실패 시 (무시)
            ).then(() => {
                window.qrReaderInitialized = true;
            });
        }
    }

    // 로그아웃 함수 (서버에 로그아웃 요청 후 홈으로 이동)
    function logout() {
        fetch('/logout', { method: 'POST' }).then(() => {
            window.location.href = '/';
        });
    }

    // 내 정보(닉네임 등) 화면에 표시하는 함수
    async function renderMyInfo() {
        let nickname = '';
        try {
            // 내 닉네임 가져오기 (스마트컨트랙트에서 불러옴)
            nickname = await contract.methods.getMyNickname().call({ from: myAddress });
            if (!nickname || nickname.trim() === "") {
                nickname = '(닉네임 없음)';
            }
        } catch (e) {
            nickname = '(닉네임 조회 실패)';
        }
        // 내 정보 행(HTML) 생성 및 표시
        let row = `
                <td>${myAddress} <span class="me">(나)</span></td>
                <td id="my-nickname-cell">${nickname}</td>
                <td><button class="action-btn edit-btn" onclick="showNicknameEditForm('${myAddress}')">수정</button>
                    <span id="nickname-edit-form-${myAddress}" class="nickname-edit-form" style="display:none;">
                        <input type="text" id="nickname-input-${myAddress}" value="${nickname}" placeholder="새 닉네임">
                        <div class="nickname-edit-buttons" style="margin-top:6px;">
                            <button class="action-btn save-btn" onclick="setMyNickname('${myAddress}')">저장</button>
                            <button class="action-btn cancel-btn" onclick="hideNicknameEditForm('${myAddress}')">취소</button>
                        </div>
                    </span></td>
            `;
        document.getElementById('my-info-row').innerHTML = row;
    }
</script>
{% endblock %}
