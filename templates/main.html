<!-- 메인 페이지 템플릿 -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메인 페이지</title>
    
    <script>
        // 세션에 로그인 완료 표시를 남기는 함수
        function setWalletLoginAndRedirect() {
            // /wallet-login 엔드포인트에 POST 요청
            fetch('/wallet-login', {method: 'POST'}).then(() => {
                // 세션 저장 후 루트로 이동
                window.location.href = '/';
            });
        }
        
        // Kaikas 로그인 함수 예시
        async function connectKaikas() {
            if (window.klaytn) {
                try {
                    // Kaikas 계정 요청
                    const accounts = await window.klaytn.enable();
                    alert('Kaikas 연결 성공!\n지갑 주소: ' + accounts[0]);
                    setWalletLoginAndRedirect();
                } catch (error) {
                    alert('Kaikas 연결 실패: ' + error.message);
                }
            } else {
                alert('Kaikas가 설치되어 있지 않습니다.');
            }
        }
        
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4?cache-bust=1"></script>
</head>
<body class="grid place-items-center">
    <nav class="block text-center w-full bg-gray-200" style="margin-bottom:20px; padding-top:5px; padding-bottom:8px;">
        <a href="/" class="hover:text-gray-500" style="padding-right:15px; border-right:1px solid #7c7c7c;">홈</a>
        <a href="#" onclick="alert('준비중'); return false;" class="hover:text-gray-500" style="padding-left:10px; margin-right: 10px;">NFT</a>
        {% if is_logged_in %}
            <button onclick="logout()" style="padding-left:15px; border-left:1px solid #7c7c7c;">로그아웃</button>
        {% endif %}
    </nav>
    <h2 class="text-3xl font-semibold tracking-tight text-balance sm:text-3xl text-center text-gray-700 mt-4">로그인</h2>
    <!-- 브라우저 정보 표시용 div (여기에 브라우저 종류와 userAgent가 표시됩니다) -->
    <div class="text-center text-sm mt-4" id="browser-info" style="margin-bottom:10px; color:blue;"></div>
    <div class="text-center text-sm text-gray-500 mt-4" id="useragent-info" style="margin-bottom:20px; font-size:0.9em;"></div>
    <script>
        // 브라우저 종류를 감지하여 div에 표시하는 함수
        function getBrowserInfo() {
            const userAgent = navigator.userAgent;
            let browser = "알 수 없음";
            if (userAgent.indexOf("Chrome") > -1 && userAgent.indexOf("Edg") === -1 && userAgent.indexOf("OPR") === -1) {
                browser = "Chrome";
            } else if (userAgent.indexOf("Safari") > -1 && userAgent.indexOf("Chrome") === -1) {
                browser = "Safari";
            } else if (userAgent.indexOf("Firefox") > -1) {
                browser = "Firefox";
            } else if (userAgent.indexOf("Edg") > -1) {
                browser = "Edge";
            } else if (userAgent.indexOf("OPR") > -1 || userAgent.indexOf("Opera") > -1) {
                browser = "Opera";
            } else if (userAgent.indexOf("Trident") > -1) {
                browser = "Internet Explorer";
            }
            // div에 브라우저 정보 표시
            document.getElementById("browser-info").innerText = "현재 사용 중인 브라우저: " + browser;
            // userAgent 전체 문자열도 별도 div에 표시
            document.getElementById("useragent-info").innerText = "userAgent: " + userAgent;
        }
        // 페이지 로드 시 브라우저 정보 표시
        window.onload = function() {
            getBrowserInfo();
        };
    </script>
    
    <!-- Kaikas 로그인 버튼 -->
    <!-- <input type="button" onclick="connectKaikas()">
        <image src="{{ url_for('static', path='kaia_wallet.png') }}" style="width:100px; height:auto;"></image>
    </input> -->

    <a href="javascript:void(0)" onclick="connectKaikas()">
        <img src="{{ url_for('static', path='kaia_wallet.png') }}" style="width:100px; cursor:pointer;">
    </a>
    <br><br>
    
    <!-- 각 버튼은 실제 지갑 연동을 위한 예시 코드입니다. -->
    <p class="text-center text-sm text-gray-500 mt-4">※ 실제 서비스 적용 시 각 지갑의 공식 문서를 참고하여 보안에 유의하세요.</p>
</body>
</html>
