<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>NFT 공유관리 데모 (Kaia/Kaikas 전용)</title>
    <script src="https://cdn.jsdelivr.net/npm/caver-js@1.10.1/dist/caver.min.js"></script>
    <style>
        body { font-family: sans-serif; }
        label { display: block; margin-top: 10px; }
        input, button { margin: 5px 0; }
        .result { margin-top: 10px; color: green; }
    </style>
</head>
<body>
<h2>NFT 공유 관리 (Kaia/Kaikas 전용)</h2>

<label>
    토큰ID:
    <input type="number" id="tokenId" min="0">
</label>
<label>
    viewer 주소:
    <input type="text" id="viewer">
</label>

<button onclick="shareNFT()">NFT 공유 (POST)</button>
<button onclick="revokeShare()">NFT 공유 취소 (DELETE)</button>
<button onclick="getAuthorized()">NFT 열람 권한 리스트 (GET)</button>
<button onclick="isAuthorized()">특정인 열람 권한 확인 (GET)</button>

<div class="result" id="result"></div>

<script>
    // 실제 배포된 컨트랙트 ABI와 주소로 교체하세요
    const CONTRACT_ABI = JSON.parse(`{{ contract_abi | tojson | safe }}`);
    const CONTRACT_ADDRESS = "{{ contract_address }}";

    const FAMILY_MANAGER_ABI = JSON.parse(`{{ fam_contract_abi | tojson | safe }}`); // 가족 관리 컨트랙트 ABI
    const FAMILY_MANAGER_ADDRESS = "{{ fam_contract_address }}"; // 가족 관리 컨트랙트 주소

    
    let caver;
    let contract;
    let userAccount;
    let familyManagerContract
    
    // Kaikas/Kaia 지갑 연결 (caver-js)
    async function connectKaikas() {
        if (window.klaytn && window.klaytn.isKaikas) {
            try {
                // 지갑 연결 요청
                const accounts = await window.klaytn.enable();
                userAccount = accounts[0];
                // Kaikas provider로 caver 인스턴스 생성
                caver = new Caver(window.klaytn);
                contract = new caver.klay.Contract(CONTRACT_ABI, CONTRACT_ADDRESS);
                familyManagerContract = new caver.klay.Contract(FAMILY_MANAGER_ABI, FAMILY_MANAGER_ADDRESS);
                setResult('Kaikas 지갑 연결 성공: ' + userAccount);
            } catch (e) {
                setResult('지갑 연결 실패: ' + e.message);
            }
        } else {
            alert("Kaikas(카이카스) 지갑을 설치해주세요.");
            window.open('https://chromewebstore.google.com/detail/kaia-wallet/jblndlipeogpafnldhgmapagcccfchpi?pli=1');
        }
    }

    // 페이지 로드시 자동 연결 시도
    window.addEventListener('load', connectKaikas);

    // NFT 공유
    async function shareNFT() {
        const tokenId = document.getElementById('tokenId').value;
        const viewer = document.getElementById('viewer').value;
        const isFamily = await familyManagerContract.methods.isMyFamily(viewer).call();
        if (tokenId === '' || !viewer) {
            return setResult('토큰ID와 주소를 모두 입력해주세요');
        }
        console.log("가족 여부:", isFamily); // true여야 함
        console.log('userAccount:', userAccount);
        console.log('tokenId:', tokenId);
        console.log('viewer:', viewer);
        if (!contract || !userAccount) return setResult('지갑 연결을 먼저 해주세요.');
        try {
            await contract.methods.shareNFT(Number(tokenId), viewer).send({
                from: userAccount,
                gas: 2000000
            });
            setResult('NFT 공유 성공!');
        } catch (e) {
            setResult('공유 실패: ' + (e.message || e));
        }
    }

    // NFT 공유 취소
    async function revokeShare() {
        const tokenId = document.getElementById('tokenId').value;
        const viewer = document.getElementById('viewer').value;
        
        // 빈 값 체크 (tokenId가 0일 수도 있으므로 === '' 사용)
        if (tokenId === '' || !viewer) {
            return setResult('토큰ID와 주소를 모두 입력해주세요');
        }
        
        if (!contract || !userAccount) return setResult('지갑 연결을 먼저 해주세요.');
        
        try {
            await contract.methods.revokeNFTSharing(Number(tokenId), viewer).send({
                from: userAccount,
                gas: 2000000
            });
            setResult('공유 취소 성공!');
        } catch (e) {
            setResult('공유 취소 실패: ' + (e.message || e));
        }
    }

    // 특정 NFT에 열람 권한이 있는 계정 조회
    async function getAuthorized() {
        const tokenId = document.getElementById('tokenId').value;
        
        // 빈 값 체크
        if (tokenId === '') {
            return setResult('토큰ID를 입력해주세요');
        }
        
        if (!contract || !userAccount) return setResult('지갑 연결을 먼저 해주세요.');
        
        try {
            const list = await contract.methods.getSharedWith(Number(tokenId)).call({
                from: userAccount
            });
            setResult('열람 권한 주소 목록: ' + JSON.stringify(list));
        } catch (e) {
            setResult('조회 실패: ' + (e.message || e));
        }
    }

    // 특정 NFT에 특정 계정이 열람 권한이 있는지 확인(true/false)
    async function isAuthorized() {
        const tokenId = document.getElementById('tokenId').value;
        const viewer = document.getElementById('viewer').value;
        
        // 빈 값 체크
        if (tokenId === '' || !viewer) {
            return setResult('토큰ID와 확인할 주소를 모두 입력해주세요');
        }
        
        if (!contract || !userAccount) return setResult('지갑 연결을 먼저 해주세요.');
        
        try {
            const authorized = await contract.methods.isAuthorized(Number(tokenId), viewer).call();
            setResult('권한 여부: ' + authorized);
        } catch (e) {
            setResult('확인 실패: ' + (e.message || e));
        }
    }

    function setResult(msg) {
        document.getElementById('result').textContent = msg;
    }
</script>
</body>
</html>
