<!-- 메인 페이지 템플릿 -->
{% extends 'base.html' %}
{% block title %}NFT 관리{% endblock %}
{% block head %}
<script src="https://cdn.jsdelivr.net/npm/caver-js@1.8.0/dist/caver.min.js"></script>
{% endblock %}
{% block content %}

<button class="upload-btn" id="uploadBtn">Image upload</button>

<div id="connectWalletSection">
    <p style="text-align: center; margin-bottom: 20px;">지갑을 연결하여 NFT를 확인하세요</p>
    <button class="connect-wallet-btn" id="connectWalletBtn">Kaikas 지갑 연결</button>
</div>

<div class="" id="nftGrid">
    <!-- NFT 항목들이 이곳에 동적으로 추가됩니다 -->
    <div class="empty-state">
        <div>불러오는 중...</div>
    </div>
</div>

<!-- 이미지 업로드 모달 -->
<div id="uploadModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <form id="nftForm">
            <div class="image-preview" id="imagePreview">
                <!-- 이미지 미리보기가 여기에 표시됩니다 -->
            </div>
            <div class="form-group">
                <label for="nftImage">이미지</label>
                <input type="file" id="nftImage" accept="image/*">
            </div>
            <div class="form-group">
                <label for="nftName">name(이름)</label>
                <input type="text" id="nftName">
            </div>
            <div class="form-group">
                <label for="nftDescription">description(설명)</label>
                <textarea id="nftDescription" rows="2"></textarea>
            </div>
            <div class="form-group">
                <label>공유할 주소</label>
                <div id="familyAddressList" class="family-address-list">
                    <!-- 가족 주소 목록이 여기에 동적으로 추가됩니다 -->
                    <div class="no-family">가족으로 등록된 주소가 없습니다.</div>
                </div>
            </div>
            <button type="submit" class="submit-btn">등록</button>
        </form>
    </div>
</div>

<!-- NFT 상세 정보 모달 -->
<div id="nftDetailModal" class="modal">
    <div class="modal-content">
        <span class="close" id="detailClose">&times;</span>
        <div id="nftDetailContainer">
            <div class="image-preview" id="detailImagePreview">
                <!-- 이미지가 여기에 표시됩니다 -->
            </div>
            <div id="detailViewMode">
                <div class="form-group">
                    <label>이름</label>
                    <div id="detailName" class="detail-text"></div>
                </div>
                <div class="form-group">
                    <label>설명</label>
                    <div id="detailDescription" class="detail-text"></div>
                </div>
                <div class="form-group">
                    <label>토큰 ID</label>
                    <div id="detailTokenId" class="detail-text"></div>
                </div>
                <div class="form-group">
                    <label>생성일</label>
                    <div id="detailCreatedAt" class="detail-text"></div>
                </div>
                <button type="button" id="editModeBtn" class="submit-btn"
                    style="background-color: var(--secondary-color);">수정하기</button>
            </div>
            <div id="detailEditMode" style="display: none;">
                <form id="nftUpdateForm">
                    <div class="form-group">
                        <label for="updateNftImage">이미지 변경</label>
                        <input type="file" id="updateNftImage" accept="image/*">
                    </div>
                    <div class="form-group">
                        <label for="updateNftName">이름</label>
                        <input type="text" id="updateNftName">
                    </div>
                    <div class="form-group">
                        <label for="updateNftDescription">설명</label>
                        <textarea id="updateNftDescription" rows="2"></textarea>
                    </div>
                    <input type="hidden" id="updateTokenId">
                    <div class="form-group">
                        <label>공유할 주소</label>
                        <div id="editFamAddressList" class="family-address-list">
                            <!-- 가족 주소 목록이 여기에 동적으로 추가됩니다 -->
                            <div class="no-family">가족으로 등록된 주소가 없습니다.</div>
                        </div>
                    </div>
                    <div class="button-group" style="display: flex; gap: 10px;">
                        <button type="button" id="cancelEditBtn" class="submit-btn"
                            style="background-color: #777; flex: 1;">취소</button>
                        <button type="submit" class="submit-btn" style="flex: 1;">저장</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div id="loader" class="loader"></div>
<div id="overlayLoaderBg" class="loading-overlay">
    <div class="loader-container">
        <div id="overlayLoader" class="loader"></div>
        <div id="loadingMessage" class="loading-message">
            거래가 아직 끝나지 않았습니다<br>지갑을 확인해주세요
        </div>
    </div>
</div>
<div id="notification" class="notification"></div>


{% endblock %}
{% block script %}
<script>
    // 컨트랙트 정보
    const FAM_CONTRACT_ADDRESS = "{{ fam_contract_address }}";
    const FAM_CONTRACT_ABI = JSON.parse(`{{ fam_contract_abi | tojson | safe }}`);
    const NFT_SHARE_CONTRACT_ADDRESS = "{{ nft_share_contract_address }}";
    const NFT_SHARE_CONTRACT_ABI = JSON.parse(`{{ nft_share_contract_abi | tojson | safe }}`);
    const CONTRACT_ADDRESS = "{{ contract_address }}"; // 스마트 컨트랙트 주소
    const ABI = JSON.parse(`{{ contract_abi | tojson | safe }}`); // 스마트 컨트랙트 ABI (함수 정보, 서버에서 받아옴)
    let nft_share_contract;
    let contract; // 컨트랙트 인스턴스
    let walletConnecting = false; // 지갑 연결 중복 방지용 변수

    // 서버 세션에서 로그인 상태 확인 (Jinja 템플릿 변수를 자바스크립트 변수로 변환)
    const IS_LOGGED_IN = "{{ is_logged_in }}" === "True";

    // 이더리움/클레이튼 주소 유효성 검사 함수
    function isValidAddress(address) {
        return address && typeof address === 'string' && /^0x[a-fA-F0-9]{40}$/.test(address);
    }

    // 전역 변수
    let caver;
    let userAccount;
    let isConnected = false;
    let currentNft = null; // 현재 선택된 NFT

    // DOM 요소들
    const uploadBtn = document.getElementById('uploadBtn');
    const uploadModal = document.getElementById('uploadModal');
    const closeBtn = document.querySelector('.close');
    const nftForm = document.getElementById('nftForm');
    const nftImage = document.getElementById('nftImage');
    const imagePreview = document.getElementById('imagePreview');
    const nftGrid = document.getElementById('nftGrid');
    const loader = document.getElementById('loader');
    const overlayLoaderBg = document.getElementById('overlayLoaderBg');
    const overlayLoader = document.getElementById('overlayLoader');
    const overlayLoadingMessage = document.getElementById('loadingMessage');
    const notification = document.getElementById('notification');
    const connectWalletSection = document.getElementById('connectWalletSection');
    const connectWalletBtn = document.getElementById('connectWalletBtn');

    // NFT 상세 정보 모달 관련 요소들
    const nftDetailModal = document.getElementById('nftDetailModal');
    const detailClose = document.getElementById('detailClose');
    const editModeBtn = document.getElementById('editModeBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const detailViewMode = document.getElementById('detailViewMode');
    const detailEditMode = document.getElementById('detailEditMode');
    const nftUpdateForm = document.getElementById('nftUpdateForm');
    const updateNftImage = document.getElementById('updateNftImage');

    // 이벤트 리스너
    document.addEventListener('DOMContentLoaded', init);
    uploadBtn.addEventListener('click', openUploadModal);
    closeBtn.addEventListener('click', closeModal);
    nftForm.addEventListener('submit', mintNFT);
    nftImage.addEventListener('change', previewImage);
    connectWalletBtn.addEventListener('click', connectKaikas);
    document.getElementById('logoutBtn').addEventListener('click', logout);

    // NFT 상세 정보 모달 이벤트 리스너
    detailClose.addEventListener('click', closeNftDetailModal);
    editModeBtn.addEventListener('click', switchToEditMode);
    cancelEditBtn.addEventListener('click', cancelEditMode);
    nftUpdateForm.addEventListener('submit', updateNFT);
    updateNftImage.addEventListener('change', previewUpdateImage);

    // 페이지 밖 클릭 시 모달 닫기
    window.onclick = function (event) {
        if (event.target == uploadModal) {
            closeModal();
        } else if (event.target == nftDetailModal) {
            closeNftDetailModal();
        }
    };

    // 페이지 초기화 함수
    async function init() {
        // Kaikas 지갑 연결 확인
        if (window.klaytn) {
            try {
                // Caver 인스턴스 초기화
                try {
                    caver = new Caver(window.klaytn);
                    await caver.klay.getBlockNumber(); // 연결 테스트
                } catch (caverError) {
                    throw new Error('블록체인 네트워크 연결에 실패했습니다.');
                }

                // 컨트랙트 초기화
                try {
                    contract = new caver.klay.Contract(ABI, CONTRACT_ADDRESS);
                    nft_share_contract = new caver.klay.Contract(NFT_SHARE_CONTRACT_ABI, NFT_SHARE_CONTRACT_ADDRESS);
                    fam_contract = new caver.klay.Contract(FAM_CONTRACT_ABI, FAM_CONTRACT_ADDRESS);

                    if (!contract || !contract.methods || !nft_share_contract || !nft_share_contract.methods) {
                        throw new Error('컨트랙트 초기화 실패');
                    }
                } catch (contractError) {
                    throw new Error('컨트랙트 초기화에 실패했습니다.');
                }

                // 이미 연결되어 있는지 확인
                if (window.klaytn.selectedAddress) {
                    userAccount = window.klaytn.selectedAddress;
                    isConnected = true;

                    // 주소 표시
                    document.getElementById('userWalletAddress').textContent =
                        userAccount.substring(0, 6) + '...' + userAccount.substring(userAccount.length - 4);
                    document.getElementById('userWalletInfo').style.display = 'block';

                    await loadUserNFTs();
                    connectWalletSection.style.display = 'none';
                } else {
                    // 세션에 로그인 되어 있다면 자동 연결 시도
                    if (IS_LOGGED_IN) {
                        try {
                            await connectKaikas();
                        } catch (error) {
                            connectWalletSection.style.display = 'block';
                            displayEmptyState('지갑을 연결하여 NFT를 확인하세요');
                        }
                    } else {
                        // 연결되지 않은 경우 지갑 연결 섹션 표시
                        connectWalletSection.style.display = 'block';
                        displayEmptyState('지갑을 연결하여 NFT를 확인하세요');
                    }
                }

                // 이벤트 리스너 설정
                setupWalletEvents();
            } catch (error) {
                displayEmptyState('Kaikas 초기화 오류: ' + error.message);
                showNotification('Kaikas 지갑 연결에 실패했습니다. 잠시 후 다시 시도해주세요.', 'error');
            }
        } else {
            connectWalletSection.style.display = 'block';
            displayEmptyState('Kaikas 지갑을 설치하고 연결하세요');
        }
    }

    // 지갑 이벤트 리스너 설정
    function setupWalletEvents() {
        // 계정 변경 이벤트 리스너
        window.klaytn.on('accountsChanged', function (accounts) {
            if (accounts.length > 0) {
                userAccount = accounts[0];
                isConnected = true;
                loadUserNFTs();
                connectWalletSection.style.display = 'none';
            } else {
                disconnect();
            }
        });

        // 네트워크 변경 이벤트 리스너
        window.klaytn.on('networkChanged', function (networkId) {
            window.location.reload(); // 페이지 새로고침으로 처리
        });
    }

    // 지갑 연결 해제 함수
    function disconnect() {
        userAccount = null;
        isConnected = false;
        connectWalletSection.style.display = 'block';
        displayEmptyState('지갑 연결이 해제되었습니다');

        // 주소 표시 제거
        document.getElementById('userWalletInfo').style.display = 'none';
        document.getElementById('userWalletAddress').textContent = '';
    }


    // 오버레이 로더 활성화
    function showOverlayLoader() {
        overlayLoaderBg.style.visibility = 'visible';
        overlayLoader.style.display = 'block';
    }

    // 오버레이 로더 비활성화화
    function hideOverlayLoader() {
        overlayLoaderBg.style.visibility = 'hidden';
        overlayLoader.style.display = 'none';
    }

    // NFT 표시 함수
    function displayNFTs(nfts, sharedNfts = []) {
        nftGrid.innerHTML = ''; // 기존 내용 초기화

        // 소유 NFT 섹션 제목 추가
        const ownedHeader = document.createElement('h2');
        ownedHeader.className = 'nft-section-title';
        ownedHeader.textContent = '내 NFT';
        nftGrid.appendChild(ownedHeader);

        // 소유한 NFT 표시
        if (!nfts || nfts.length === 0) {
            const emptyOwned = document.createElement('div');
            emptyOwned.className = 'empty-state';
            emptyOwned.textContent = '발행한 NFT가 없습니다';
            nftGrid.appendChild(emptyOwned);
        } else {
            const ownedGrid = document.createElement('div');
            ownedGrid.className = 'nft-grid owned-grid';

            nfts.forEach(nft => {
                const nftElement = createNftElement(nft, true);
                ownedGrid.appendChild(nftElement);
            });

            nftGrid.appendChild(ownedGrid);
        }

        // 공유받은 NFT 섹션 제목 추가
        const sharedHeader = document.createElement('h2');
        sharedHeader.className = 'nft-section-title';
        sharedHeader.textContent = '공유받은 NFT';
        sharedHeader.style.marginTop = '30px';
        nftGrid.appendChild(sharedHeader);

        // 공유받은 NFT 표시
        if (!sharedNfts || sharedNfts.length === 0) {
            const emptyShared = document.createElement('div');
            emptyShared.className = 'empty-state';
            emptyShared.textContent = '공유받은 NFT가 없습니다';
            nftGrid.appendChild(emptyShared);
        } else {
            const sharedGrid = document.createElement('div');
            sharedGrid.className = 'nft-grid shared-grid';

            sharedNfts.forEach(nft => {
                const nftElement = createNftElement(nft, false);
                sharedGrid.appendChild(nftElement);
            });

            nftGrid.appendChild(sharedGrid);
        }
    }

    // DOM 요소 만들어주는 함수
    function createNftElement(nft, isOwned) {
        const nftElement = document.createElement('div');
        nftElement.className = 'nft-item';
        nftElement.setAttribute('data-nft-id', nft.id);

        // 이미지 데이터가 있으면 표시, 없으면 빈 공간
        const imageHtml = nft.image ?
            `<img src="${nft.image}" alt="${nft.name}" style="width:100%; height:100%; object-fit:contain;">` :
            '';

        nftElement.innerHTML = `
            <div class="nft-image">${imageHtml}</div>
            <div class="nft-details">
                <div class="nft-name">${nft.name || '이름 없음'}</div>
                <div class="nft-badge ${isOwned ? 'owned' : 'shared'}">${isOwned ? '소유' : '공유받음'}</div>
            </div>
        `;

        // NFT 클릭 이벤트 추가
        nftElement.addEventListener('click', () => {
            openNftDetailModal(nft, isOwned);
        });

        return nftElement;
    }

    // 빈 상태 표시 함수
    function displayEmptyState(message) {
        nftGrid.innerHTML = `
            <div class="empty-state">
                <div>${message}</div>
            </div>
        `;
    }

    // 사용자의 NFT 목록 불러오기 (소유 + 공유받은 NFT)
    async function loadUserNFTs() {
        if (!isConnected) {
            displayEmptyState('지갑이 연결되어 있지 않습니다');
            return;
        }

        try {
            showLoader();
            displayEmptyState('NFT를 불러오는 중...');

            // 컨트랙트 주소 확인
            if (!isValidAddress(CONTRACT_ADDRESS) || !isValidAddress(NFT_SHARE_CONTRACT_ADDRESS)) {
                displayEmptyState('컨트랙트 주소 오류');
                hideLoader();
                return;
            }

            // 1. 소유한 NFT 가져오기
            const ownedNfts = await fetchUserNFTs();

            // 2. 공유받은 NFT 가져오기
            const sharedNfts = await fetchSharedNFTs();

            // NFT 목록 표시 (소유 + 공유 함께)
            if ((ownedNfts && ownedNfts.length > 0) || (sharedNfts && sharedNfts.length > 0)) {
                displayNFTs(ownedNfts, sharedNfts);
            } else {
                displayEmptyState('소유하거나 공유받은 NFT가 없습니다');
            }
        } catch (error) {
            // 오류 메시지를 더 구체적으로 표시
            let errorMessage = '알 수 없는 오류';

            if (error.message) {
                errorMessage = error.message.substring(0, 100);
            } else if (error.code) {
                errorMessage = `오류 코드: ${error.code}, 메시지: ${error.message || '없음'}`;
            }

            displayEmptyState(`NFT 로딩 오류: ${errorMessage}`);
        } finally {
            hideLoader();
        }
    }

    // 공유받은 NFT 목록 가져오기
    async function fetchSharedNFTs() {
        try {
            // 공유받은 토큰 ID 목록 가져오기
            const sharedTokenIds = await nft_share_contract.methods.getAuthorized().call({
                from: userAccount
            });

            if (!sharedTokenIds || sharedTokenIds.length === 0) {
                return [];
            }

            // 각 공유 토큰에 대한 정보 가져오기
            const sharedNfts = [];
            for (const tokenId of sharedTokenIds) {
                try {
                    // 토큰 존재 확인
                    let exists = false;
                    try {
                        exists = Boolean(sharedTokenIds);
                        console.log("공유 받은 토큰: ", exists)
                    } catch (existsError) {
                        continue;
                    }

                    if (exists) {
                        // 토큰 정보 가져오기
                        const tokenInfo = await contract.methods.getTokenInfo(tokenId).call();
                        const tokenURI = await contract.methods.uri(tokenId).call();

                        // URI 디코딩 및 파싱
                        const metadata = parseTokenURI(tokenURI);

                        sharedNfts.push({
                            id: tokenId,
                            name: tokenInfo.name,
                            description: tokenInfo.description,
                            image: metadata.image,
                            createdAt: tokenInfo.createdAt,
                            isOwned: false, // 공유받은 NFT 표시
                            isShared: true
                        });
                    }
                } catch (tokenError) {
                    // 개별 토큰 오류는 무시하고 계속 진행
                    console.error(`토큰 ${tokenId} 정보 가져오기 실패:`, tokenError);
                }
            }

            return sharedNfts;
        } catch (error) {
            console.error("공유 NFT 가져오기 오류:", error);
            return []; // 오류 발생 시 빈 배열 반환
        }
    }

    // 사용자 NFT 가져오기
    async function fetchUserNFTs() {
        try {
            // 블록 범위를 제한하여 이벤트 조회 (최근 10000 블록만 조회)
            const currentBlock = await caver.klay.getBlockNumber();
            const fromBlock = Math.max(0, currentBlock - 10000);

            let events;
            try {
                events = await contract.getPastEvents('TokenCreated', {
                    filter: { creator: userAccount },
                    fromBlock: fromBlock,
                    toBlock: 'latest'
                });
            } catch (eventError) {
                // 필터 없이 다시 시도
                events = await contract.getPastEvents('TokenCreated', {
                    fromBlock: fromBlock,
                    toBlock: 'latest'
                });

                // 가져온 이벤트에서 사용자 계정과 관련된 이벤트만 필터링
                events = events.filter(event =>
                    event.returnValues &&
                    event.returnValues.creator &&
                    event.returnValues.creator.toLowerCase() === userAccount.toLowerCase()
                );
            }

            if (!events || events.length === 0) {
                return [];
            }

            // 각 토큰 ID에 대한 정보 가져오기
            const nfts = [];
            for (const event of events) {
                try {
                    const tokenId = event.returnValues.tokenId;

                    if (!tokenId) continue;

                    let exists = false;
                    try {
                        exists = await contract.methods.exists(tokenId).call();
                    } catch (existsError) {
                        continue;
                    }

                    if (exists) {
                        try {
                            const tokenInfo = await contract.methods.getTokenInfo(tokenId).call();
                            const tokenURI = await contract.methods.uri(tokenId).call();

                            // URI 디코딩 및 파싱
                            const metadata = parseTokenURI(tokenURI);

                            nfts.push({
                                id: tokenId,
                                name: tokenInfo.name,
                                description: tokenInfo.description,
                                image: metadata.image,
                                createdAt: tokenInfo.createdAt
                            });
                        } catch (tokenError) {
                            // 오류가 발생해도 다음 토큰으로 진행
                        }
                    }
                } catch (tokenError) {
                    // 오류가 발생해도 계속 진행
                }
            }

            return nfts;
        } catch (error) {
            // 대체 방법으로 직접 토큰 조회 시도
            try {
                // balanceOf를 통해 토큰 개수 확인 후 tokenOfOwnerByIndex로 조회
                if (contract.methods.balanceOf) {
                    const balance = await contract.methods.balanceOf(userAccount).call();

                    if (balance > 0) {
                        const nfts = [];
                        for (let i = 0; i < Math.min(balance, 10); i++) { // 최대 10개만 조회
                            try {
                                if (contract.methods.tokenOfOwnerByIndex) {
                                    const tokenId = await contract.methods.tokenOfOwnerByIndex(userAccount, i).call();
                                    const tokenURI = await contract.methods.uri(tokenId).call();
                                    const metadata = parseTokenURI(tokenURI);

                                    nfts.push({
                                        id: tokenId,
                                        name: metadata.name || '이름 없음',
                                        description: metadata.description || '',
                                        image: metadata.image || '',
                                        createdAt: Date.now()
                                    });
                                }
                            } catch (e) {
                                // 개별 토큰 조회 오류는 무시
                            }
                        }

                        if (nfts.length > 0) {
                            return nfts;
                        }
                    }
                }
            } catch (alternativeError) {
                // 대체 방법도 실패
            }

            throw error; // 원래 에러 전달
        }
    }

    // Kaikas 지갑 연결 함수
    async function connectKaikas() {
        if (walletConnecting) return false; // 이미 연결 중이면 중단

        try {
            walletConnecting = true; // 연결 시작 표시
            showLoader();

            if (!window.klaytn) {
                showNotification('Kaikas 지갑이 설치되어 있지 않습니다.', 'error');
                return false;
            }

            // 지갑 연결 요청
            const accounts = await window.klaytn.enable();
            if (!accounts || accounts.length === 0) {
                throw new Error('지갑 주소를 가져올 수 없습니다.');
            }

            userAccount = accounts[0];

            // 주소 표시
            document.getElementById('userWalletAddress').textContent =
                userAccount.substring(0, 6) + '...' + userAccount.substring(userAccount.length - 4);
            document.getElementById('userWalletInfo').style.display = 'block';

            // 컨트랙트 주소 확인
            if (!isValidAddress(CONTRACT_ADDRESS)) {
                showNotification('유효한 컨트랙트 주소가 설정되지 않았습니다.', 'error');
                hideLoader();
                walletConnecting = false;
                return false;
            }

            // Caver 객체 초기화 및 컨트랙트 인스턴스 생성
            try {
                caver = new Caver(window.klaytn);

                // ABI 유효성 검사
                if (!ABI || !Array.isArray(ABI) || ABI.length === 0) {
                    throw new Error('컨트랙트 ABI가 유효하지 않습니다.');
                }

                // 컨트랙트 인스턴스 생성
                contract = new caver.klay.Contract(ABI, CONTRACT_ADDRESS);

                // 컨트랙트 객체 유효성 검사
                if (!contract || !contract.methods) {
                    throw new Error('컨트랙트 인스턴스 생성에 실패했습니다.');
                }
            } catch (contractError) {
                showNotification('컨트랙트 초기화 중 오류: ' + contractError.message, 'error');
                throw contractError;
            }

            isConnected = true;
            showNotification('지갑이 연결되었습니다', 'success');
            connectWalletSection.style.display = 'none';

            await loadUserNFTs();
            return true;
        } catch (error) {
            showNotification('지갑 연결에 실패했습니다: ' + (error.message || '알 수 없는 오류'), 'error');
            return false;
        } finally {
            hideLoader();
            walletConnecting = false; // 연결 종료 표시
        }
    }

    // NFT 민팅 함수
    async function mintNFT(event) {
        event.preventDefault();

        if (!isConnected) {
            showNotification('먼저 지갑을 연결해주세요!', 'error');
            return;
        }

        const name = document.getElementById('nftName').value;
        const description = document.getElementById('nftDescription').value;

        // 선택된 가족 주소 목록 가져오기
        const selectedAddresses = Array.from(
            document.querySelectorAll('#familyAddressList input[type="checkbox"]:checked')
        ).map(checkbox => checkbox.getAttribute('data-address'));

        // 공유할 주소 목록을 문자열로 변환 (콤마로 구분)
        const sharedAddresses = selectedAddresses.join(',');

        const imageFile = document.getElementById('nftImage').files[0];

        if (!name || !imageFile) {
            showNotification('이름과 이미지는 필수 입력사항입니다.', 'error');
            return;
        }

        try {
            showOverlayLoader();
            overlayLoadingMessage.style.display = 'block';

            // 이미지를 Base64로 변환
            const imageBase64 = await convertImageToBase64(imageFile);

            // 이미지 크기가 너무 크면 경고
            const MAX_RECOMMENDED_SIZE = 1000000; // 약 1MB
            if (imageBase64.length > MAX_RECOMMENDED_SIZE) {
                const confirmContinue = confirm(`이미지 크기가 큽니다 (${Math.round(imageBase64.length / 1024)} KB). 가스 비용이 많이 들 수 있습니다. 계속 진행하시겠습니까?`);
                if (!confirmContinue) {
                    hideLoader();
                    return;
                }
            }

            // 메타데이터 생성 (공유할 주소 목록 포함)
            const metadata = {
                name: name,
                description: description,
                image: imageBase64,
                shared_with: sharedAddresses // 공유할 주소 목록
            };

            // 컨트랙트 객체가 없거나 컨트랙트 주소가 없는 경우 에러 처리
            if (!contract || !contract.methods || !isValidAddress(CONTRACT_ADDRESS)) {
                showNotification('컨트랙트 정보가 없어 NFT를 발행할 수 없습니다.', 'error');
                hideLoader();
                return;
            }

            // contract.methods.mint이 존재하는지 확인
            if (!contract.methods.mint) {
                showNotification('컨트랙트에 mint 함수가 없습니다. ABI를 확인해주세요.', 'error');
                hideLoader();
                return;
            }

            // 이미지 크기에 따라 가스 한도 동적 계산 및 트랜잭션 실행
            const txPromise1 = await executeMintTransaction(name, description, imageBase64, selectedAddresses);
            await Promise.all([txPromise1]);
            overlayLoadingMessage.style.display = 'none';
            closeModal();
            hideOverlayLoader();
            await loadUserNFTs();
        } catch (error) {
            let errorMsg = error.message || '알 수 없는 오류';
            if (errorMsg.length > 100) {
                errorMsg = errorMsg.substring(0, 100) + '...';
            }
            showNotification('NFT 발행 중 오류가 발생했습니다: ' + errorMsg, 'error');
        } finally {
            hideOverlayLoader();
        }
    }

    // 민팅 트랜잭션 실행
    async function executeMintTransaction(name, description, imageBase64, selectedAddresses) {
        try {
            // 이미지 크기에 따라 가스 한도 동적 계산
            const baseGas = 15000000; // 기본 가스
            const gasPerByte = 300; // 바이트당 추가 가스
            const imageSize = imageBase64.length;
            const estimatedGas = baseGas + Math.floor(imageSize * gasPerByte);
            const maxGas = Math.min(estimatedGas, 100000000);
            // 트랜잭션 실행
            const receipt = await contract.methods.mint(name, description, imageBase64)
                .send({ from: userAccount, gas: maxGas });

            const createdTokenID = receipt.events.TokenCreated.returnValues[0];

            // 민팅 성공 후, 선택된 가족 주소들에게 NFT 공유 처리
            if (selectedAddresses.length > 0) {
                try {
                    console.log("선택 패밀리 리스트: ", selectedAddresses);
                    // 각 주소마다 개별적으로 공유 처리
                    await Promise.all(selectedAddresses.map(address =>
                        nft_share_contract.methods.shareNFT(createdTokenID.toString(), address).send({
                            from: userAccount,
                            gas: 2000000
                        }).then(req_share => {
                            console.log('트랜잭션 성공:', req_share);
                        })
                    ));
                    console.log('nft 공유 끝!');

                    await showNotification(`NFT가 성공적으로 발행되고 ${selectedAddresses.length}명의 가족과 공유되었습니다!`, 'success');
                } catch (shareError) {
                    console.log('공유 오류:', shareError);
                    showNotification('NFT는 발행되었지만 공유 중 오류가 발생했습니다.', 'error');
                }
            } else {
                showNotification('NFT가 성공적으로 발행되었습니다!', 'success');
            }

            return receipt;
        } catch (txError) {
            throw txError;
        }
    }

    // 이미지를 Base64로 변환하는 함수
    function convertImageToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = function (e) {
                // 이미지 최적화를 위한 임시 이미지 생성
                const img = new Image();
                img.onload = function () {
                    // 이미지 최대 크기 제한 (픽셀)
                    const MAX_WIDTH = 800;
                    const MAX_HEIGHT = 800;

                    let width = img.width;
                    let height = img.height;

                    // 이미지 크기 조정 (필요 시)
                    if (width > MAX_WIDTH || height > MAX_HEIGHT) {
                        if (width > height) {
                            if (width > MAX_WIDTH) {
                                height = Math.round(height * (MAX_WIDTH / width));
                                width = MAX_WIDTH;
                            }
                        } else {
                            if (height > MAX_HEIGHT) {
                                width = Math.round(width * (MAX_HEIGHT / height));
                                height = MAX_HEIGHT;
                            }
                        }
                    }

                    // 캔버스에 이미지 그리기
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;

                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    // 이미지 품질 조정 (0.5 = 50% 품질)
                    const quality = 0.6;
                    const optimizedBase64 = canvas.toDataURL('image/jpeg', quality);

                    resolve(optimizedBase64);
                };
                img.src = e.target.result;
            };
            reader.onerror = function (error) {
                reject(error);
            };
            reader.readAsDataURL(file);
        });
    }

    // 토큰 URI 파싱 함수
    function parseTokenURI(tokenURI) {
        try {
            // URI가 없거나 유효하지 않은 경우 기본값 반환
            if (!tokenURI || tokenURI.trim() === '') {
                return { image: '', name: 'Unknown', description: 'No metadata' };
            }

            // data:application/json;base64, 형식에서 base64 부분 추출
            if (tokenURI.startsWith('data:application/json;base64,')) {
                const base64 = tokenURI.split(',')[1];
                try {
                    const jsonString = atob(base64);
                    return JSON.parse(jsonString);
                } catch (decodeError) {
                    return { image: '', name: 'Unknown', description: 'Error decoding metadata' };
                }
            }
            // IPFS나 HTTP URI를 직접 사용하는 경우
            else if (tokenURI.startsWith('ipfs://') || tokenURI.startsWith('http://') || tokenURI.startsWith('https://')) {
                // 이 경우 URI 자체를 반환하고 필요시 별도 로직으로 처리해야 함
                return {
                    image: tokenURI,
                    name: 'External URI',
                    description: 'This token uses an external URI'
                };
            }
            // JSON 문자열을 직접 사용하는 경우
            else if (tokenURI.startsWith('{') && tokenURI.endsWith('}')) {
                try {
                    return JSON.parse(tokenURI);
                } catch (parseError) {
                    return { image: '', name: 'Unknown', description: 'Error parsing JSON metadata' };
                }
            }
            // 기타 알 수 없는 형식
            else {
                return { image: '', name: 'Unknown', description: 'Unknown metadata format' };
            }
        } catch (error) {
            return { image: '', name: 'Error', description: 'Error parsing metadata' };
        }
    }

                    `<img src="${e.target.result}" alt="Preview" style="max-width:100%; max-height:100%;">`;
            };
            reader.readAsDataURL(file);
        }
    }

    // NFT 메타데이터 & 가족 공유 업데이트
    async function updateNFT(event) {
        event.preventDefault();

        if (!isConnected) {
            showNotification('먼저 지갑을 연결해주세요!', 'error');
            return;
        }

        const tokenId = document.getElementById('updateTokenId').value;
        const name = document.getElementById('updateNftName').value;
        const description = document.getElementById('updateNftDescription').value;
        const imageFile = document.getElementById('updateNftImage').files[0];

        console.log("비어있는지 확인: ", Boolean(imageFile));

        const detailImagePreviewImg = document.querySelector('#detailImagePreview img');
        console.log("detailImagePreview img: ", detailImagePreviewImg);

        // 선택된 가족 주소 목록 가져오기
        const selectedAddresses = Array.from(
            document.querySelectorAll('#editFamAddressList input[type="checkbox"]:checked')
        ).map(checkbox => checkbox.getAttribute('data-address'));

        // 체크되지 않은 가족 주소 목록 가져오기
        const unselectedAddresses = Array.from(
            document.querySelectorAll('#editFamAddressList input[type="checkbox"]:not(:checked)')
        ).map(checkbox => checkbox.getAttribute('data-address'));

        console.log("selectedAddresses: ", selectedAddresses);
        console.log("unselectedAddresses: ", unselectedAddresses);

        // 현재 공유된 주소 목록 조회
        let sharedAddresses = await nft_share_contract.methods.getSharedWith(tokenId).call({ from: userAccount });
        console.log("sharedAddresses: ", sharedAddresses);

        const sharedAddressesLower = sharedAddresses.map(addr => addr.toLowerCase());

        // 공유할 주소 목록 (체크된 주소 중 아직 공유되지 않은 주소)
        let readyToShareList = selectedAddresses.filter(address =>
            !sharedAddressesLower.includes(address.toLowerCase())
        );

        // 공유 취소할 주소 목록 (체크 해제된 주소 중 이미 공유된 주소)
        let readyToRevokeList = unselectedAddresses.filter(address =>
            sharedAddressesLower.includes(address.toLowerCase())
        );

        console.log("readyToShareList: ", readyToShareList);
        console.log("readyToRevokeList: ", readyToRevokeList);

        if (!name) {
            showNotification('이름은 필수 입력사항입니다.', 'error');
            return;
        }

        try {

            // NFT 정보 변경 확인
            let metadataChanged = false;
            let imageBase64 = currentNft.image;

            console.log("현 NFT 정보: ", "\nimg: ", imageFile, "\nname: ", name, "\ndescription: ", description);
            console.log("이전 NFT 정보: ", "\nimg: ", imageBase64, "\nname: ", currentNft.name, "\ndescription: ", currentNft.description);

            // 이미지 or 이름 or 설명 변경 확인
            if (imageFile || name !== currentNft.name || description !== currentNft.description) {
                metadataChanged = true;
            }

            // 이미지 변경 확인
            if (detailImagePreviewImg && imageFile) {
                const imageBase64 = detailImagePreviewImg.src;


                // 이미지 크기 경고
                const MAX_RECOMMENDED_SIZE = 1000000; // 약 1MB
                if (imageBase64.length > MAX_RECOMMENDED_SIZE) {
                    const confirmContinue = confirm(`이미지 크기가 큽니다 (${Math.round(imageBase64.length / 1024)} KB). 가스 비용이 많이 들 수 있습니다. 계속 진행하시겠습니까?`);
                    if (!confirmContinue) {
                        hideLoader();
                        return;
                    }
                }
            }

            imageBase64 = detailImagePreviewImg.src || currentNft.image

            console.log("imageBase64 확인: ", imageBase64)

            let sharingChange = readyToShareList.length > 0 || readyToRevokeList.length > 0;

            if (!metadataChanged && !sharingChange) {
                showNotification('변경된 내용이 없습니다.', 'common');
                return;
            }

            showOverlayLoader();
            overlayLoadingMessage.style.display = 'block';


            if (metadataChanged) {
                // 스마트 컨트랙트에 update 함수가 있는지 확인
                if (!contract.methods.updateMetadata) {
                    showNotification('NFT 수정 기능이 컨트랙트에 구현되어 있지 않습니다.', 'error');
                    hideLoader();
                    return;
                }
            }

            // 이미지 크기에 따라 가스 한도 동적 계산
            const baseGas = 15000000;
            const gasPerByte = 300;
            const imageSize = imageBase64.length;
            const estimatedGas = baseGas + Math.floor(imageSize * gasPerByte);
            const maxGas = Math.min(estimatedGas, 100000000);

            // 트랜잭션 실행
            if (metadataChanged) {
                console.log("metadataChanged 있음");
                const rq1 = await contract.methods.updateMetadata(tokenId, name, description, imageBase64)
                    .send({ from: userAccount, gas: maxGas });
            }

            if (sharingChange) {
                console.log("sharingChange 있음");
                const rq2 = await toggleNFTShare(tokenId, readyToShareList, readyToRevokeList);
            }

            if (metadataChanged) {
                // 현재 선택된 NFT 정보 업데이트
                currentNft.name = name;
                currentNft.description = description;
                if (imageBase64) {
                    currentNft.image = imageBase64;
                }
            }

            overlayLoadingMessage.style.display = 'none';
            closeNftDetailModal();
            showNotification('NFT가 성공적으로 수정되었습니다!', 'success');

            // 상세 보기 모드로 전환하고 정보 업데이트
            document.getElementById('detailName').textContent = name;
            document.getElementById('detailDescription').textContent = description;
            detailViewMode.style.display = 'block';
            detailEditMode.style.display = 'none';

            hideOverlayLoader();
            // NFT 목록 새로고침
            await loadUserNFTs();

        } catch (error) {
            let errorMsg = error.message || '알 수 없는 오류';
            if (errorMsg.length > 100) {
                errorMsg = errorMsg.substring(0, 100) + '...';
            }
            hideOverlayLoader();
            showNotification('NFT 수정 중 오류가 발생했습니다: ' + errorMsg, 'error');
        } finally {
            hideOverlayLoader();
        }
    }
</script>
